name: Deploy Support Jennifer to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Function App
        run: |
          zip -r deploy.zip . -x "*.git*" -x "*.github*" -x "*.pyc" -x "__pycache__/*"
          az functionapp deployment source config-zip \
            --resource-group uniram-reports-rg \
            --name uniram-support \
            --src deploy.zip
